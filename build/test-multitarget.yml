# Repo: FirelyTeam/Cql-sdk
# File: build/test-multitarget.yml
# Multi-framework testing template for .NET 8 and .NET 10
#
# This template explicitly tests against both target frameworks to verify
# identical behavior across .NET 8 (LTS) and .NET 10 (LTS).
#
# Usage: Include this template in azure-pipelines.yml to add multi-framework test coverage

parameters:
  - name: dotNetCoreVersion
    type: string
    default: '10.0.x'
  - name: testProjects
    type: string
    default: '**/*Tests/*Tests.csproj'
  - name: buildConfiguration
    type: string
    default: 'Release'

jobs:
  - job: TestNet8
    displayName: 'Test on .NET 8'
    pool:
      vmImage: 'windows-latest'
    steps:
      - task: UseDotNet@2
        displayName: 'Install .NET 8 SDK'
        inputs:
          packageType: 'sdk'
          version: '8.0.x'
          installationPath: $(Agent.ToolsDirectory)/dotnet

      - task: UseDotNet@2
        displayName: 'Install .NET 10 SDK'
        inputs:
          packageType: 'sdk'
          version: '${{ parameters.dotNetCoreVersion }}'
          installationPath: $(Agent.ToolsDirectory)/dotnet

      - task: DotNetCoreCLI@2
        displayName: 'Restore dependencies'
        inputs:
          command: 'restore'
          projects: '${{ parameters.testProjects }}'

      - task: DotNetCoreCLI@2
        displayName: 'Build test projects'
        inputs:
          command: 'build'
          projects: '${{ parameters.testProjects }}'
          arguments: '--configuration ${{ parameters.buildConfiguration }} --no-restore'

      - task: DotNetCoreCLI@2
        displayName: 'Run tests on .NET 8'
        inputs:
          command: 'test'
          projects: '${{ parameters.testProjects }}'
          arguments: '--configuration ${{ parameters.buildConfiguration }} --no-build --framework net8.0 --logger trx --collect:"XPlat Code Coverage" --results-directory $(Agent.TempDirectory)/TestResults/net8.0'
          publishTestResults: false

      - task: PublishTestResults@2
        displayName: 'Publish .NET 8 test results'
        condition: succeededOrFailed()
        inputs:
          testResultsFormat: 'VSTest'
          testResultsFiles: '$(Agent.TempDirectory)/TestResults/net8.0/**/*.trx'
          testRunTitle: 'Tests on .NET 8'
          mergeTestResults: true
          failTaskOnFailedTests: true

      - task: PublishCodeCoverageResults@2
        displayName: 'Publish .NET 8 code coverage'
        condition: succeededOrFailed()
        inputs:
          summaryFileLocation: '$(Agent.TempDirectory)/TestResults/net8.0/**/coverage.cobertura.xml'
          pathToSources: '$(Build.SourcesDirectory)'

  - job: TestNet10
    displayName: 'Test on .NET 10'
    pool:
      vmImage: 'windows-latest'
    steps:
      - task: UseDotNet@2
        displayName: 'Install .NET 8 SDK'
        inputs:
          packageType: 'sdk'
          version: '8.0.x'
          installationPath: $(Agent.ToolsDirectory)/dotnet

      - task: UseDotNet@2
        displayName: 'Install .NET 10 SDK'
        inputs:
          packageType: 'sdk'
          version: '${{ parameters.dotNetCoreVersion }}'
          installationPath: $(Agent.ToolsDirectory)/dotnet

      - task: DotNetCoreCLI@2
        displayName: 'Restore dependencies'
        inputs:
          command: 'restore'
          projects: '${{ parameters.testProjects }}'

      - task: DotNetCoreCLI@2
        displayName: 'Build test projects'
        inputs:
          command: 'build'
          projects: '${{ parameters.testProjects }}'
          arguments: '--configuration ${{ parameters.buildConfiguration }} --no-restore'

      - task: DotNetCoreCLI@2
        displayName: 'Run tests on .NET 10'
        inputs:
          command: 'test'
          projects: '${{ parameters.testProjects }}'
          arguments: '--configuration ${{ parameters.buildConfiguration }} --no-build --framework net10.0 --logger trx --collect:"XPlat Code Coverage" --results-directory $(Agent.TempDirectory)/TestResults/net10.0'
          publishTestResults: false

      - task: PublishTestResults@2
        displayName: 'Publish .NET 10 test results'
        condition: succeededOrFailed()
        inputs:
          testResultsFormat: 'VSTest'
          testResultsFiles: '$(Agent.TempDirectory)/TestResults/net10.0/**/*.trx'
          testRunTitle: 'Tests on .NET 10'
          mergeTestResults: true
          failTaskOnFailedTests: true

      - task: PublishCodeCoverageResults@2
        displayName: 'Publish .NET 10 code coverage'
        condition: succeededOrFailed()
        inputs:
          summaryFileLocation: '$(Agent.TempDirectory)/TestResults/net10.0/**/coverage.cobertura.xml'
          pathToSources: '$(Build.SourcesDirectory)'

  - job: CompareTestResults
    displayName: 'Compare Test Results Across Frameworks'
    dependsOn:
      - TestNet8
      - TestNet10
    condition: succeededOrFailed()
    pool:
      vmImage: 'windows-latest'
    steps:
      - task: DownloadPipelineArtifact@2
        displayName: 'Download test results'
        inputs:
          artifactName: 'TestResults'
          targetPath: '$(Agent.TempDirectory)/AllTestResults'
        continueOnError: true

      - powershell: |
          Write-Host "##[section]Multi-Framework Test Comparison Report"
          Write-Host ""
          Write-Host "This pipeline tested the SDK against both .NET 8 (LTS) and .NET 10 (LTS)"
          Write-Host "to verify identical behavior across frameworks."
          Write-Host ""
          
          $net8Status = "$(TestNet8.status)"
          $net10Status = "$(TestNet10.status)"
          
          Write-Host "Test Results:"
          Write-Host "  .NET 8:  $net8Status"
          Write-Host "  .NET 10: $net10Status"
          Write-Host ""
          
          if ($net8Status -eq "Succeeded" -and $net10Status -eq "Succeeded") {
              Write-Host "##[section]✅ SUCCESS: Tests pass on both .NET 8 and .NET 10"
              Write-Host "The SDK exhibits identical behavior across both LTS frameworks."
          } elseif ($net8Status -ne $net10Status) {
              Write-Host "##[warning]⚠️ WARNING: Test results differ between frameworks!"
              Write-Host "This may indicate a framework-specific issue that needs investigation."
          } else {
              Write-Host "##[error]❌ FAILURE: Tests failed on both frameworks"
          }
        displayName: 'Compare results'
        condition: always()
