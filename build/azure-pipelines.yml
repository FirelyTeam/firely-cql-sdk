# Repo: FirelyTeam/Cql-sdk
# File: build/azure-pipelines.yml
name: build-$(Date:yyyyMMdd)$(Rev:-r)
resources:
  repositories:
    - repository: templates
      type: github
      name: FirelyTeam/azure-pipeline-templates
      endpoint: FirelyTeam
      ref: refs/heads/feature/DEVOPS-366-firely-cql-sdk-Switch-to-template

variables:
  - group: CodeSigning
  - group: APIKeys
  - template: variables.yml

pool:
  vmImage: $(vmImage)

trigger:
  branches:
    include:
    - develop*
    - develop-2.0*
    - release*
    - refs/tags/v*
    - spike*

stages:
- stage: checkForDocChangesStage
  displayName: 'Check for changes in docs folder'
  jobs:
    - job: CheckDocChangesJob
      displayName: 'Check for changes in docs folder'
      pool: 
        vmImage: ubuntu-latest
      steps:
        - checkout: self
          fetchDepth: 0 
        - script: |
            echo "##vso[task.setvariable variable=SOURCE_BRANCH]$(Build.SourceBranch)"
            echo "##vso[task.setvariable variable=TARGET_BRANCH]$(System.PullRequest.TargetBranch)"
        - powershell: |
            echo "##[group]Checking for changes outside docs folder"
            # Check if we are in a PR build or normal branch build
            if ($env:BUILD_REASON -eq "PullRequest") {
                echo "PR build detected"
                # PR build: compare source branch with target branch (e.g., main)
                $CHANGED_FILES = git diff --name-only origin/$env:TARGET_BRANCH
                echo "Checking changes between $env:TARGET_BRANCH and $env:SOURCE_BRANCH results in the following files: $CHANGED_FILES"
            } else {
                echo "Branch build detected"
                # Branch build: compare current commit with previous commit
                git fetch origin $env:Build_SourceBranch --depth=2
                $CHANGED_FILES = git diff --name-only HEAD~1 HEAD
                echo "Checking results in the following files: $CHANGED_FILES"
            }

            $skipBuildStage = 'true'

            foreach ($file in $CHANGED_FILES) {
                if ($file -match '^docs\/.+$' -eq $false) {
                    $skipBuildStage = 'false'
                    echo "File $file is not /docs/ folder"
                    break
                }
                echo "File $file is in /docs/ folder"
            }  

          
            if ( $skipBuildStage -eq 'true') {
              Write-Host "Only /docs/ files changed, skipping build."
            } 
            else {
              Write-Host "Changes outside /docs/ detected, proceeding with build."
            }
            echo "##vso[task.setvariable variable=skipBuild;isOutput=true]$skipBuildStage" 

          displayName: 'Check for changes outside docs folder'
          name: checkForDocChanges            
- stage: build  
  dependsOn: checkForDocChangesStage
  condition: and(succeeded(), not(eq(dependencies.checkForDocChangesStage.outputs['CheckDocChangesJob.checkForDocChanges.skipBuild'], 'true')))
  jobs:
  - template: build.yml@templates  # Template reference
    parameters:
      dotNetCoreVersion: $(DOTNET_CORE_SDK)
      ${{ if not(startswith(variables['Build.SourceBranch'], 'refs/tags/v')) }}:  # 'normal' build
        useVersionSuffix: true
      ${{ else }}: # release mode
        useVersionSuffix: false
      buildSolutionFile: 'Cql-Sdk-All.sln'
      packageSolutionFile: 'Cql-Sdk.slnf'
      testProjects: |
        **/*Tests/*Tests.csproj
        **/**/Test.Measures.Demo.csproj
        !**/Ncqa.HT.DeckTests.csproj
        submodules\Firely.Cql.Sdk.Integration.Runner\IntegrationRunner\IntegrationRunner.csproj
      packageArtifacts: true
      restoreDependencies: true
      nuGetServiceConnections: GitHubPackageGetFeed
      nuGetSources: --source https://nuget.pkg.github.com/FirelyTeam/index.json
      codeSignerCertificate: $(FirelyCodeSignerCertificate)
      codeSignerPassword: $(CodeSigningPassword)
      signingKeyFileName: 'cql-sdk.snk'
      filesForSigning: >
        $(Build.SourcesDirectory)\Cql\*\bin\Release\*\Hl7.Cql*.dll,
        $(Build.SourcesDirectory)\Cql\*\bin\Release\*\Ncqa.Cql*.dll,
        $(Build.SourcesDirectory)*\bin\Release\*\Cql.*.dll,
        $(Build.SourcesDirectory)*\bin\Release\*\PackagerCLI.dll
      filesToExcludeForSigning: >
        *CodeGeneration*,
        *CoreTests*
      pool:
        vmImage: $(vmImage)

- stage: deployToGitHub
  dependsOn: build
  displayName: Deploy packages To Github
  condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest')) # not a PR
  jobs:
  - deployment: gitHub
    displayName: Deploy Packages to GitHub
    environment: GitHub
    strategy:
      runOnce:
        deploy:
          steps:
          - template: push-nuget-package.yml@templates
            parameters:
              artifact: 'NuGetPackages'
              source: https://nuget.pkg.github.com/FirelyTeam/index.json
              apiKey: $(GITHUB_PACKAGES_APIKEY)

- stage: deployToNuget
  dependsOn: deployToGitHub
  displayName: Deploy packages to NuGet
  condition: and(succeeded(), startswith(variables['Build.SourceBranch'], 'refs/tags/v'))
  jobs:
  - deployment: NuGet
    displayName: Deploy Packages to Nuget
    environment: NuGet
    strategy:
      runOnce:
        deploy:
          steps:
          - template: push-nuget-package.yml@templates
            parameters:
              artifact: 'NuGetPackages'
              source: https://api.nuget.org/v3/index.json
              apiKey: $(NUGET_APIKEY)
