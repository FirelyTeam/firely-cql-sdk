# Repo: FirelyTeam/Cql-sdk
# File: build/azure-pipelines.yml
name: build-$(Date:yyyyMMdd)$(Rev:-r)
resources:
  repositories:
    - repository: templates
      type: github
      name: FirelyTeam/azure-pipeline-templates
      endpoint: FirelyTeam
      ref: refs/tags/v1

variables:
  - group: CodeSigning
  - group: APIKeys
  - template: variables.yml

pool:
  vmImage: $(vmImage)

trigger:
  branches:
    include:
    - develop*
    - release*
    - refs/tags/v*
    - spike*

stages:
- template: check-skip-stage.yml@templates
  parameters:
    ignorePatterns:
      - '^docs/.+'

# Include the build-test-sign template which defines Build, Test, and Package stages
- template: build-test-sign.yml
  parameters:
    buildStageDependsOn: checkSkipStage
    buildStageCondition: and(succeeded(), ne(dependencies.checkSkipStage.outputs['checkChanges.evaluateIgnorePatterns.skip'], 'true'))
    dotNetCoreVersion: $(DOTNET_CORE_SDK)
    multiTargetTestProjects: $(multiTargetTestProjects)
    net10IntegrationTestProjects: $(net10IntegrationTestProjects)
    buildConfiguration: $(buildConfiguration)
    testConsoleLoggerVerbosity: $(testConsoleLoggerVerbosity)
    checkoutSubmodules: 'true'
    ${{ if not(startswith(variables['Build.SourceBranch'], 'refs/tags/v')) }}:  # 'normal' build
      useVersionSuffix: true
    ${{ else }}: # release mode
      useVersionSuffix: false
    # Only sign on release tags (v* tag)
    ${{ if startswith(variables['Build.SourceBranch'], 'refs/tags/v') }}:
      shouldSign: true
      azureServiceConnectionForSigning: 'AzureTrustedSigningPrincipal'
      trustedSigningAccountEndpoint: 'https://weu.codesigning.azure.net/'
      trustedSigningAccountName: 'FirelyCodeSigning'
      certificateProfileName: 'FirelyCodeSigning'
    ${{ else }}: # non-tag builds: skip signing
      shouldSign: false
      azureServiceConnectionForSigning: ''
      trustedSigningAccountEndpoint: ''
      trustedSigningAccountName: ''
      certificateProfileName: ''
    signingKeyFileName: 'cql-sdk.snk'
    filesForSigning: >-
      $(Build.SourcesDirectory)\Cql\*\bin\Release\*\Hl7.Cql*.dll,
      $(Build.SourcesDirectory)*\bin\Release\*\Cql.*.dll,
      $(Build.SourcesDirectory)*\bin\Release\*\PackagerCLI.dll
    filesToExcludeForSigning: >-
      *CodeGeneration*,
      *CoreTests*
    nuGetServiceConnections: GitHubPackageGetFeed

- stage: deployToGitHub
  dependsOn: Test
  displayName: Deploy packages To Github
  condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest')) # not a PR
  jobs:
  - deployment: gitHub
    pool:
      vmImage: $(vmImage)
    displayName: Deploy Packages to GitHub
    environment: GitHub
    strategy:
      runOnce:
        deploy:
          steps:
          - template: push-nuget-package.yml@templates
            parameters:
              artifact: 'NuGetPackages'
              source: https://nuget.pkg.github.com/FirelyTeam/index.json
              apiKey: $(GITHUB_PACKAGES_APIKEY)

- stage: deployToNuget
  dependsOn: deployToGitHub
  displayName: Deploy packages to NuGet
  condition: and(succeeded(), startswith(variables['Build.SourceBranch'], 'refs/tags/v'))
  jobs:
  - deployment: NuGet
    pool:
      vmImage: $(vmImage)
    displayName: Deploy Packages to Nuget
    environment: NuGet
    strategy:
      runOnce:
        deploy:
          steps:
          - template: push-nuget-package.yml@templates
            parameters:
              artifact: 'NuGetPackages'
              source: https://api.nuget.org/v3/index.json
              apiKey: $(NUGET_APIKEY)
