# Repo: FirelyTeam/Cql-sdk
# File: build/build-test-sign.yml
# Optimized multi-framework build, test, and sign template for .NET 8 and .NET 10
#
# This template implements an optimized pipeline:
# 1. Build Stage - Single build job that builds once and publishes artifacts
# 2. Test Stage - Parallel test jobs download artifacts and run tests
# 3. Sign & Package Stage - Only runs on release tags or develop branch (not PRs)
#
# Optimizations:
# - Build once, test in parallel (avoids duplicate builds)
# - Java dependencies are cached across builds
# - Signing only happens on release tags or develop branch
# - .NET SDKs are only installed once in the build job (test jobs only install what they need)
#
# Usage: Include this template in azure-pipelines.yml for complete build/test/sign pipeline

parameters:
  - name: dotNetCoreVersion
    type: string
    default: '10.0.x'
  - name: multiTargetTestProjects
    type: string
    default: ''
  - name: net10IntegrationTestProjects
    type: string
    default: ''
  - name: buildConfiguration
    type: string
    default: 'Release'
  - name: checkoutSubmodules
    type: string
    default: 'false'
  - name: useVersionSuffix
    type: boolean
    default: true
  - name: azureServiceConnectionForSigning
    type: string
    default: ''
  - name: trustedSigningAccountEndpoint
    type: string
    default: ''
  - name: trustedSigningAccountName
    type: string
    default: ''
  - name: certificateProfileName
    type: string
    default: ''
  - name: signingKeyFileName
    type: string
    default: ''
  - name: filesForSigning
    type: string
    default: ''
  - name: filesToExcludeForSigning
    type: string
    default: ''
  - name: nuGetServiceConnections
    type: string
    default: ''
  - name: shouldSign
    type: boolean
    default: false

jobs:
  # ============================================================================
  # BUILD JOB - Builds once and publishes artifacts for test jobs
  # ============================================================================
  - job: Build
    displayName: 'Build Solution'
    pool:
      vmImage: 'windows-latest'
    variables:
      JAVA_CACHE_KEY: 'java-deps | "$(Agent.OS)" | Demo/Cql/Build/pom.xml'
    steps:
      - checkout: self
        submodules: ${{ parameters.checkoutSubmodules }}

      # Install .NET SDKs (only once in build job)
      - task: UseDotNet@2
        displayName: 'Install .NET 8 SDK'
        inputs:
          packageType: 'sdk'
          version: '8.0.x'
          installationPath: $(Agent.ToolsDirectory)/dotnet

      - task: UseDotNet@2
        displayName: 'Install .NET 10 SDK'
        inputs:
          packageType: 'sdk'
          version: '${{ parameters.dotNetCoreVersion }}'
          installationPath: $(Agent.ToolsDirectory)/dotnet

      - task: NuGetAuthenticate@1
        displayName: 'NuGet Authenticate'
        inputs:
          nuGetServiceConnections: '${{ parameters.nuGetServiceConnections }}'

      # Cache Java dependencies to avoid re-downloading on each build
      - task: Cache@2
        displayName: 'Cache Java Dependencies'
        inputs:
          key: $(JAVA_CACHE_KEY)
          path: $(Build.SourcesDirectory)/Demo/Cql/Build/target/dependency
          restoreKeys: |
            java-deps | "$(Agent.OS)"

      - task: DotNetCoreCLI@2
        displayName: 'Restore solution'
        inputs:
          command: 'restore'
          projects: 'Cql-Sdk-All.sln'
          feedsToUse: 'config'
          nugetConfigPath: 'NuGet.config'

      - task: DotNetCoreCLI@2
        displayName: 'Build solution'
        inputs:
          command: 'build'
          projects: 'Cql-Sdk-All.sln'
          ${{ if eq(parameters.useVersionSuffix, true) }}:
            arguments: '--configuration ${{ parameters.buildConfiguration }} --no-restore /p:VersionSuffix=$(Build.BuildNumber)'
          ${{ else }}:
            arguments: '--configuration ${{ parameters.buildConfiguration }} --no-restore'

      # Publish build artifacts for test jobs
      - task: PublishPipelineArtifact@1
        displayName: 'Publish Build Artifacts'
        inputs:
          targetPath: '$(Build.SourcesDirectory)'
          artifact: 'BuildOutput'
          publishLocation: 'pipeline'

  # ============================================================================
  # TEST JOBS - Download artifacts and run tests in parallel
  # ============================================================================
  - job: TestNet8
    displayName: 'Test on .NET 8'
    dependsOn: Build
    pool:
      vmImage: 'windows-latest'
    steps:
      - checkout: self
        submodules: ${{ parameters.checkoutSubmodules }}

      # Only install .NET 8 SDK for running tests
      - task: UseDotNet@2
        displayName: 'Install .NET 8 SDK'
        inputs:
          packageType: 'sdk'
          version: '8.0.x'
          installationPath: $(Agent.ToolsDirectory)/dotnet

      - task: NuGetAuthenticate@1
        displayName: 'NuGet Authenticate'
        inputs:
          nuGetServiceConnections: '${{ parameters.nuGetServiceConnections }}'

      # Download build artifacts
      - task: DownloadPipelineArtifact@2
        displayName: 'Download Build Artifacts'
        inputs:
          buildType: 'current'
          artifactName: 'BuildOutput'
          targetPath: '$(Build.SourcesDirectory)'

      - task: DotNetCoreCLI@2
        displayName: 'Run tests on .NET 8'
        inputs:
          command: 'test'
          projects: '${{ parameters.multiTargetTestProjects }}'
          arguments: '--configuration ${{ parameters.buildConfiguration }} --no-build --framework net8.0 --logger trx --collect:"XPlat Code Coverage" --results-directory $(Agent.TempDirectory)/TestResults/net8.0'
          publishTestResults: false

      - task: PublishTestResults@2
        displayName: 'Publish .NET 8 test results'
        condition: succeededOrFailed()
        inputs:
          testResultsFormat: 'VSTest'
          testResultsFiles: '$(Agent.TempDirectory)/TestResults/net8.0/**/*.trx'
          testRunTitle: 'Tests on .NET 8'
          mergeTestResults: true
          failTaskOnFailedTests: true

      - task: PublishCodeCoverageResults@2
        displayName: 'Publish .NET 8 code coverage'
        condition: succeededOrFailed()
        inputs:
          summaryFileLocation: '$(Agent.TempDirectory)/TestResults/net8.0/**/coverage.cobertura.xml'
          pathToSources: '$(Build.SourcesDirectory)'

  - job: TestNet10
    displayName: 'Test on .NET 10'
    dependsOn: Build
    pool:
      vmImage: 'windows-latest'
    steps:
      - checkout: self
        submodules: ${{ parameters.checkoutSubmodules }}

      # Only install .NET 10 SDK for running tests
      - task: UseDotNet@2
        displayName: 'Install .NET 10 SDK'
        inputs:
          packageType: 'sdk'
          version: '${{ parameters.dotNetCoreVersion }}'
          installationPath: $(Agent.ToolsDirectory)/dotnet

      - task: NuGetAuthenticate@1
        displayName: 'NuGet Authenticate'
        inputs:
          nuGetServiceConnections: '${{ parameters.nuGetServiceConnections }}'

      # Download build artifacts
      - task: DownloadPipelineArtifact@2
        displayName: 'Download Build Artifacts'
        inputs:
          buildType: 'current'
          artifactName: 'BuildOutput'
          targetPath: '$(Build.SourcesDirectory)'

      - task: DotNetCoreCLI@2
        displayName: 'Run tests on .NET 10'
        inputs:
          command: 'test'
          projects: '${{ parameters.multiTargetTestProjects }}'
          arguments: '--configuration ${{ parameters.buildConfiguration }} --no-build --framework net10.0 --logger trx --collect:"XPlat Code Coverage" --results-directory $(Agent.TempDirectory)/TestResults/net10.0'
          publishTestResults: false

      - task: PublishTestResults@2
        displayName: 'Publish .NET 10 test results'
        condition: succeededOrFailed()
        inputs:
          testResultsFormat: 'VSTest'
          testResultsFiles: '$(Agent.TempDirectory)/TestResults/net10.0/**/*.trx'
          testRunTitle: 'Tests on .NET 10'
          mergeTestResults: true
          failTaskOnFailedTests: true

      - task: PublishCodeCoverageResults@2
        displayName: 'Publish .NET 10 code coverage'
        condition: succeededOrFailed()
        inputs:
          summaryFileLocation: '$(Agent.TempDirectory)/TestResults/net10.0/**/coverage.cobertura.xml'
          pathToSources: '$(Build.SourcesDirectory)'

  - job: TestIntegrationNet10
    displayName: 'Integration Tests on .NET 10'
    dependsOn: Build
    pool:
      vmImage: 'windows-latest'
    steps:
      - checkout: self
        submodules: ${{ parameters.checkoutSubmodules }}

      # Only install .NET 10 SDK for running tests
      - task: UseDotNet@2
        displayName: 'Install .NET 10 SDK'
        inputs:
          packageType: 'sdk'
          version: '${{ parameters.dotNetCoreVersion }}'
          installationPath: $(Agent.ToolsDirectory)/dotnet

      - task: NuGetAuthenticate@1
        displayName: 'NuGet Authenticate'
        inputs:
          nuGetServiceConnections: '${{ parameters.nuGetServiceConnections }}'

      # Download build artifacts
      - task: DownloadPipelineArtifact@2
        displayName: 'Download Build Artifacts'
        inputs:
          buildType: 'current'
          artifactName: 'BuildOutput'
          targetPath: '$(Build.SourcesDirectory)'

      - task: DotNetCoreCLI@2
        displayName: 'Run integration tests on .NET 10'
        inputs:
          command: 'test'
          projects: '${{ parameters.net10IntegrationTestProjects }}'
          arguments: '--configuration ${{ parameters.buildConfiguration }} --no-build --framework net10.0 --logger trx --collect:"XPlat Code Coverage" --results-directory $(Agent.TempDirectory)/TestResults/integration-net10.0'
          publishTestResults: false

      - task: PublishTestResults@2
        displayName: 'Publish integration test results'
        condition: succeededOrFailed()
        inputs:
          testResultsFormat: 'VSTest'
          testResultsFiles: '$(Agent.TempDirectory)/TestResults/integration-net10.0/**/*.trx'
          testRunTitle: 'Integration Tests on .NET 10'
          mergeTestResults: true
          failTaskOnFailedTests: true

      - task: PublishCodeCoverageResults@2
        displayName: 'Publish integration test code coverage'
        condition: succeededOrFailed()
        inputs:
          summaryFileLocation: '$(Agent.TempDirectory)/TestResults/integration-net10.0/**/coverage.cobertura.xml'
          pathToSources: '$(Build.SourcesDirectory)'

  # ============================================================================
  # SIGN & PACKAGE JOB - Only runs on release tags or develop branch (not PRs)
  # ============================================================================
  - job: SignAndPackage
    displayName: 'Sign and Package'
    dependsOn:
      - TestNet8
      - TestNet10
      - TestIntegrationNet10
    condition: and(succeeded(), eq('${{ parameters.shouldSign }}', 'true'))
    pool:
      vmImage: 'windows-latest'
    steps:
      - checkout: self
        submodules: ${{ parameters.checkoutSubmodules }}

      - task: UseDotNet@2
        displayName: 'Install .NET 8 SDK'
        inputs:
          packageType: 'sdk'
          version: '8.0.x'
          installationPath: $(Agent.ToolsDirectory)/dotnet

      - task: UseDotNet@2
        displayName: 'Install .NET 10 SDK'
        inputs:
          packageType: 'sdk'
          version: '${{ parameters.dotNetCoreVersion }}'
          installationPath: $(Agent.ToolsDirectory)/dotnet

      - task: NuGetAuthenticate@1
        displayName: 'NuGet Authenticate'
        inputs:
          nuGetServiceConnections: '${{ parameters.nuGetServiceConnections }}'

      # Download build artifacts
      - task: DownloadPipelineArtifact@2
        displayName: 'Download Build Artifacts'
        inputs:
          buildType: 'current'
          artifactName: 'BuildOutput'
          targetPath: '$(Build.SourcesDirectory)'

      - task: UseDotNet@2
        displayName: 'Install .NET 8 runtime for signing'
        condition: and(succeeded(), ne('${{ parameters.azureServiceConnectionForSigning }}', ''))
        inputs:
          packageType: runtime
          version: 8.x
          includePreviewVersions: false

      - task: AzureCLI@2
        displayName: 'Sign assemblies with Azure Trusted Signing'
        condition: and(succeeded(), ne('${{ parameters.azureServiceConnectionForSigning }}', ''))
        inputs:
          azureSubscription: '${{ parameters.azureServiceConnectionForSigning }}'
          scriptType: 'pscore'
          scriptLocation: 'inlineScript'
          addSpnToEnvironment: true
          inlineScript: |
            # Install dotnet sign tool
            Write-Host "Installing dotnet sign tool..."
            dotnet tool install --global sign --version 0.9.1-beta.25379.1

            if ($LASTEXITCODE -ne 0) {
              Write-Error "Failed to install dotnet sign tool"
              exit 1
            }

            # Get list of files to sign
            $filesToSign = @()
            $patterns = "${{ parameters.filesForSigning }}" -split ','
            $excludePatterns = "${{ parameters.filesToExcludeForSigning }}" -split ','

            foreach ($pattern in $patterns) {
              $pattern = $pattern.Trim()
              if ($pattern) {
                $files = Get-ChildItem -Path $pattern -Recurse -ErrorAction SilentlyContinue
                foreach ($file in $files) {
                  $excluded = $false
                  foreach ($excludePattern in $excludePatterns) {
                    $excludePattern = $excludePattern.Trim()
                    if ($excludePattern -and $file.FullName -like "*$excludePattern*") {
                      $excluded = $true
                      break
                    }
                  }
                  if (-not $excluded) {
                    $filesToSign += $file.FullName
                  }
                }
              }
            }

            if ($filesToSign.Count -eq 0) {
              Write-Host "No files to sign"
              exit 0
            }

            Write-Host "Found $($filesToSign.Count) file(s) to sign:"
            $filesToSign | ForEach-Object { Write-Host "  $_" }

            # Sign each file
            foreach ($file in $filesToSign) {
              Write-Host "`nSigning file: $file"

              $signArgs = @(
                'code',
                'trusted-signing',
                $file,
                '--trusted-signing-account', '${{ parameters.trustedSigningAccountName }}',
                '--trusted-signing-certificate-profile', '${{ parameters.certificateProfileName }}',
                '--trusted-signing-endpoint', '${{ parameters.trustedSigningAccountEndpoint }}',
                '--azure-credential-type', 'azure-cli'
              )

              & sign @signArgs

              if ($LASTEXITCODE -ne 0) {
                Write-Error "Failed to sign file: $file"
                exit 1
              }

              Write-Host "Successfully signed: $file"
            }

            Write-Host "`nAll files signed successfully!"

      - task: DotNetCoreCLI@2
        displayName: 'Package solution'
        inputs:
          command: 'pack'
          packagesToPack: 'Cql-Sdk.slnf'
          configuration: '${{ parameters.buildConfiguration }}'
          packDirectory: '$(Build.ArtifactStagingDirectory)/NuGetPackages'
          nobuild: true
          ${{ if eq(parameters.useVersionSuffix, true) }}:
            buildProperties: 'VersionSuffix=$(Build.BuildNumber)'
          includesymbols: true
          includesource: true

      - task: PublishBuildArtifacts@1
        displayName: 'Publish NuGet packages'
        inputs:
          PathtoPublish: '$(Build.ArtifactStagingDirectory)/NuGetPackages'
          ArtifactName: 'NuGetPackages'
          publishLocation: 'Container'

  # ============================================================================
  # PACKAGE WITHOUT SIGNING JOB - For PRs (no signing, just package for verification)
  # ============================================================================
  - job: PackageWithoutSigning
    displayName: 'Package (No Signing)'
    dependsOn:
      - TestNet8
      - TestNet10
      - TestIntegrationNet10
    condition: and(succeeded(), eq('${{ parameters.shouldSign }}', 'false'))
    pool:
      vmImage: 'windows-latest'
    steps:
      - checkout: self
        submodules: ${{ parameters.checkoutSubmodules }}

      - task: UseDotNet@2
        displayName: 'Install .NET 8 SDK'
        inputs:
          packageType: 'sdk'
          version: '8.0.x'
          installationPath: $(Agent.ToolsDirectory)/dotnet

      - task: UseDotNet@2
        displayName: 'Install .NET 10 SDK'
        inputs:
          packageType: 'sdk'
          version: '${{ parameters.dotNetCoreVersion }}'
          installationPath: $(Agent.ToolsDirectory)/dotnet

      - task: NuGetAuthenticate@1
        displayName: 'NuGet Authenticate'
        inputs:
          nuGetServiceConnections: '${{ parameters.nuGetServiceConnections }}'

      # Download build artifacts
      - task: DownloadPipelineArtifact@2
        displayName: 'Download Build Artifacts'
        inputs:
          buildType: 'current'
          artifactName: 'BuildOutput'
          targetPath: '$(Build.SourcesDirectory)'

      - task: DotNetCoreCLI@2
        displayName: 'Package solution (unsigned)'
        inputs:
          command: 'pack'
          packagesToPack: 'Cql-Sdk.slnf'
          configuration: '${{ parameters.buildConfiguration }}'
          packDirectory: '$(Build.ArtifactStagingDirectory)/NuGetPackages'
          nobuild: true
          ${{ if eq(parameters.useVersionSuffix, true) }}:
            buildProperties: 'VersionSuffix=$(Build.BuildNumber)'
          includesymbols: true
          includesource: true

      - task: PublishBuildArtifacts@1
        displayName: 'Publish NuGet packages (unsigned)'
        inputs:
          PathtoPublish: '$(Build.ArtifactStagingDirectory)/NuGetPackages'
          ArtifactName: 'NuGetPackages'
          publishLocation: 'Container'

  # ============================================================================
  # COMPARISON JOB - Compare test results across frameworks
  # ============================================================================
  - job: CompareTestResults
    displayName: 'Compare Test Results Across Frameworks'
    dependsOn:
      - TestNet8
      - TestNet10
      - TestIntegrationNet10
    condition: succeededOrFailed()
    pool:
      vmImage: 'windows-latest'
    variables:
      net8Status: $[ dependencies.TestNet8.result ]
      net10Status: $[ dependencies.TestNet10.result ]
      integrationStatus: $[ dependencies.TestIntegrationNet10.result ]
    steps:
      - powershell: |
          Write-Host "##[section]Multi-Framework Test Comparison Report"
          Write-Host ""
          Write-Host "This pipeline built the SDK once and tested against both .NET 8 (LTS) and .NET 10 (LTS)"
          Write-Host "to verify identical behavior across frameworks."
          Write-Host ""

          $net8Status = "$(net8Status)"
          $net10Status = "$(net10Status)"
          $integrationStatus = "$(integrationStatus)"

          Write-Host "Test Results:"
          Write-Host "  .NET 8:  $net8Status"
          Write-Host "  .NET 10: $net10Status"
          Write-Host ""
          Write-Host "Integration Test Results:"
          Write-Host "  .NET 10: $integrationStatus"
          Write-Host ""

          if ($net8Status -eq "Succeeded" -and $net10Status -eq "Succeeded" -and $integrationStatus -eq "Succeeded") {
              Write-Host "##[section]✅ SUCCESS: All tests pass on both .NET 8 and .NET 10, including integration tests"
              Write-Host "The SDK exhibits identical behavior across both LTS frameworks."
          } elseif ($net8Status -ne $net10Status) {
              Write-Host "##[warning]⚠️ WARNING: Test results differ between .NET 8 and .NET 10!"
              Write-Host "This may indicate a framework-specific issue that needs investigation."
          } elseif ($integrationStatus -ne "Succeeded") {
              Write-Host "##[warning]⚠️ WARNING: Integration tests failed on .NET 10"
          } else {
              Write-Host "##[error]❌ FAILURE: Tests failed"
          }
        displayName: 'Compare results'
        condition: always()
